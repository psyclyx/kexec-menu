name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: fmt
        run: nix-shell --run "cargo fmt --check"

      - name: clippy
        run: nix-shell --run "cargo clippy --workspace --all-features --target x86_64-unknown-linux-musl -- -D warnings"

      - name: test
        run: nix-shell --run "cargo test --workspace --target x86_64-unknown-linux-musl"

  build-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: uki
        run: nix-build -A uki-x86_64 -o result-uki

      - name: stage artifacts
        run: |
          mkdir -p artifacts
          cp result-uki/kexec-menu.efi artifacts/kexec-menu-x86_64.efi
          nix-build -A kexec-menu -o result-bin
          cp result-bin/bin/kexec-menu artifacts/kexec-menu-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: x86_64
          path: artifacts/

  build-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: uki
        run: nix-build -A uki-aarch64 -o result-uki

      - name: stage artifacts
        run: |
          mkdir -p artifacts
          cp result-uki/kexec-menu.efi artifacts/kexec-menu-aarch64.efi
          nix-build -A kexec-menu-aarch64 -o result-bin
          cp result-bin/bin/kexec-menu artifacts/kexec-menu-aarch64

      - uses: actions/upload-artifact@v4
        with:
          name: aarch64
          path: artifacts/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, build-x86_64, build-aarch64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  dev:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [check, build-x86_64, build-aarch64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: update dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Development Build
          prerelease: true
          body: |
            Latest build from `main` (${{ github.sha }}).
            Updated on each push. Not a stable release.
          files: artifacts/*
