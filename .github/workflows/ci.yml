name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: fmt
        run: nix-shell --run "cargo fmt --check"

      - name: clippy
        run: nix-shell --run "cargo clippy --workspace --all-features --target x86_64-unknown-linux-musl -- -D warnings"

      - name: test
        run: nix-shell --run "cargo test --workspace --target x86_64-unknown-linux-musl"

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        attr:
          - kexec-menu
          - kexec-menu-aarch64
          - uki-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: build
        run: nix-build -A ${{ matrix.attr }}
