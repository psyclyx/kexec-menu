name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31

      - name: fmt
        run: nix-shell --run "cargo fmt --check"

      - name: clippy
        run: nix-shell --run "cargo clippy --workspace --all-features --target x86_64-unknown-linux-musl -- -D warnings"

      - name: test
        run: nix-shell --run "cargo test --workspace --target x86_64-unknown-linux-musl"

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - attr: uki-x86_64
            artifact: kexec-menu-x86_64.efi
          - attr: uki-aarch64
            artifact: kexec-menu-aarch64.efi
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31

      - name: build
        run: nix-build -A ${{ matrix.attr }} -o result

      - name: stage artifacts
        run: |
          mkdir -p artifacts
          cp result artifacts/${{ matrix.artifact }}
          # Also extract the standalone binary from the nix store
          bin_attr="${{ matrix.attr == 'uki-x86_64' && 'kexec-menu' || 'kexec-menu-aarch64' }}"
          nix-build -A "$bin_attr" -o result-bin
          bin_name="${{ matrix.attr == 'uki-x86_64' && 'kexec-menu-x86_64' || 'kexec-menu-aarch64' }}"
          cp result-bin/bin/kexec-menu "artifacts/$bin_name"

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  dev:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [check, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: update dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Development Build
          prerelease: true
          body: |
            Latest build from `main` (${{ github.sha }}).
            Updated on each push. Not a stable release.
          files: artifacts/*
